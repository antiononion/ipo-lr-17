<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Camping Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #3e6b57, #7fb685);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px 20px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .links {
            margin-top: 40px;
        }

        .link-btn {
            display: inline-block;
            padding: 12px 25px;
            margin: 10px;
            font-size: 16px;
            border-radius: 6px;
            text-decoration: none;
            background-color: white;
            color: #3e6b57;
            font-weight: bold;
            transition: 0.3s;
        }

        .link-btn:hover {
            background-color: #e6e6e6;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 15px;
            background-color: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<header>
    <h1>🌲 Camping Project</h1>
    <p>Главная страница</p>
</header>

<div class="links">
    <!-- Вставь свой путь внутрь href -->
    <a href="author/" class="link-btn">Автор</a>

    <!-- Вставь свой путь внутрь href -->
    <a href="shop/" class="link-btn">Магазин</a>
</div>

<footer>
    © 2026 Camping Project
</footer>

</body>
</html>
